# CI Pipeline for Archon V2 Alpha
# Uses uv (per CLAUDE.md) -- not pip/flake8/black/isort.

name: CI Pipeline

on:
  push:
    branches: [main, develop, 'release/*']
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'

env:
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '20'

jobs:
  # ============================================
  # LINTING & TYPE CHECKING
  # ============================================
  lint:
    name: Linting & Type Checking (Python 3.12)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        working-directory: python
        run: uv sync --group dev

      - name: Ruff lint
        working-directory: python
        run: uv run ruff check src/ tests/
        continue-on-error: true

      - name: Ruff format check
        working-directory: python
        run: uv run ruff format --check src/ tests/
        continue-on-error: true

      - name: Mypy type check
        working-directory: python
        run: uv run mypy src/ || echo "::warning::mypy reported issues -- review"
        continue-on-error: true

  # ============================================
  # FRONTEND LINT / TYPE CHECK / TEST / BUILD
  # ============================================
  frontend:
    name: Frontend (Node ${{ env.NODE_VERSION }})
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: archon-ui-main/package-lock.json

      - name: Install dependencies
        working-directory: archon-ui-main
        run: npm ci

      - name: ESLint
        working-directory: archon-ui-main
        run: npm run lint
        continue-on-error: true

      - name: TypeScript type check
        working-directory: archon-ui-main
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Run Vitest
        working-directory: archon-ui-main
        run: |
          # Tests are allowed to fail without blocking CI while the suite
          # stabilises; coverage is generated and uploaded either way.
          npm run test:coverage:run || echo "::warning::Vitest reported failures -- see logs"

      - name: Build
        working-directory: archon-ui-main
        run: npm run build

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-test-results
          path: archon-ui-main/public/test-results/test-results.json
          retention-days: 30

  # ============================================
  # UNIT TESTS WITH COVERAGE
  # ============================================
  test:
    name: Test (Python 3.12)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies (with test extras)
        working-directory: python
        run: uv sync --group dev --extra test

      - name: Run unit tests
        working-directory: python
        run: |
          # Threshold chosen low to avoid blocking the first CI run before
          # the test suite reaches steady-state coverage.
          uv run pytest tests/ \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=50 \
            --junitxml=junit/test-results.xml \
            -v --tb=short

      - name: Upload coverage XML to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: python/coverage.xml
          flags: backend
          name: backend-coverage
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: python/junit/test-results.xml
          retention-days: 30

  # ============================================
  # DOCKER BUILD CHECK
  # ============================================
  docker-build:
    name: Docker Build (server)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build server image
        run: |
          docker build \
            --file python/Dockerfile.server \
            --tag archon-server:ci \
            --build-arg ARCHON_SERVER_PORT=8181 \
            python/

  # ============================================
  # SUMMARY
  # ============================================
  coverage-summary:
    name: Coverage Summary
    runs-on: ubuntu-latest
    needs: [test, frontend]
    if: always()

    steps:
      - name: Coverage status
        run: |
          echo "## Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f python/coverage.xml ]; then
            echo "Coverage report generated successfully." >> $GITHUB_STEP_SUMMARY
            echo "See Codecov dashboard for line-by-line breakdown." >> $GITHUB_STEP_SUMMARY
          else
            echo "Coverage report was not produced." >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f archon-ui-main/public/test-results/test-results.json ]; then
            echo "Frontend test results: archon-ui-main/public/test-results/test-results.json" >> $GITHUB_STEP_SUMMARY
          else
            echo "Frontend test results were not produced." >> $GITHUB_STEP_SUMMARY
          fi
